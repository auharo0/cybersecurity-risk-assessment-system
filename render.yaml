services:
  # Web Service
  - type: web
    name: cras-system
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: APP_NAME
        value: "CRAS System"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        sync: false
      - key: APP_KEY
        generateValue: true
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromDatabase:
          name: cras-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: cras-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: cras-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: cras-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: cras-db
          property: password
      - key: SESSION_DRIVER
        value: file
      - key: SESSION_LIFETIME
        value: 120
      - key: CACHE_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync

databases:
  # MySQL Database
  - name: cras-db
    databaseName: cras_system
    plan: free
